name: Build Replenish

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5.4.0
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Get short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload Artifact with short SHA
        uses: actions/upload-artifact@vv7.0.1
        with:
          name: Replenish-${{ steps.sha.outputs.short_sha }}
          path: target/*.jar
