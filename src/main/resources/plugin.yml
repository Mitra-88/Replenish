name: Replenish
main: dev.replenish.ReplenishPlugin
version: 1.4.0
api-version: "1.21"
description: "Auto-replants crops (Hypixel-style), with configurable seeds, tools, and per-crop toggles."
authors: [ "Mitra-88" ]

commands:
  replenish:
    description: "Replenish admin / maintenance commands"
    usage: "/<command> <toggle|reload>"
    aliases: [ "repl" ]
    permission: replenish.use
    permission-message: "&cYou do not have permission to use this command."

permissions:
  # Convenience wildcard
  replenish.*:
    description: "Access to all Replenish permissions."
    default: op
    children:
      replenish.use: true
      replenish.toggle: true
      replenish.reload: true

  # Base command access (/replenish shows help; subcommands still check their own perms)
  replenish.use:
    description: "Allows using /replenish base command."
    default: op

  # /replenish toggle — flips the global enabled state
  replenish.toggle:
    description: "Allows toggling Replenish on/off globally."
    default: op

  # /replenish reload — reloads config.yml
  replenish.reload:
    description: "Allows reloading Replenish configuration."
    default: op
