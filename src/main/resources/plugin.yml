name: Replenish
main: dev.replenish.ReplenishPlugin
version: 5.2.1
api-version: "26.2"
description: "Auto-replants crops with age preservation, Fortune-respecting drops, and direct pickup."
authors: [ "Mitra-88" ]

commands:
  replenish:
    description: Replenish admin command
    usage: /replenish <toggle|reload|status>
    permission: replenish.use
    permission-message: "&cYou do not have permission to use this command."

permissions:
  replenish.*:
    description: "Access to all Replenish permissions."
    default: op
    children:
      replenish.use: true
      replenish.toggle: true
      replenish.reload: true
      replenish.status: true

  replenish.use:
    description: "Allows using /replenish base command."
    default: true

  replenish.toggle:
    description: "Allows toggling Replenish on/off globally."
    default: op

  replenish.reload:
    description: "Allows reloading Replenish configuration."
    default: op

  replenish.status:
    description: "Allows viewing current Replenish status."
    default: true
