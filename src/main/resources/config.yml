# ============================================
#         REPLENISH CONFIG
# ============================================

# --------------------------
# GENERAL SETTINGS
# --------------------------

config-version: 3              # DON'T TOUCH THIS!!!

enabled: true                  # master switch: false disables all replanting globally
requirePlayerSeed: true        # consume 1 seed from inventory on mature harvest
directPickup: true             # drops go straight to the player
replantDelayTicks: 1           # 1 tick = 50ms
maxReplantsPerTick: 1024       # maximum crops replanted per tick (20 ticks/second)
# raise this on beefier servers if replants lag behind
# lower it on weaker servers to reduce load
checkUpdates: true             # check GitHub for new releases on server startup

# --------------------------
# CROP TOGGLES (turn on/off)
# --------------------------

crops:
  wheat: true
  carrots: true
  potatoes: true
  nether_wart: true
  cocoa: true
  beetroots: true

  # TORCHFLOWER: The CROP (grown from seeds) will be replanted automatically.
  # The decorative TORCHFLOWER flower block (placed from inventory) is NOT a crop
  # and will not be replanted – players will see an in-game message explaining this.
  torchflower: true

  # PITCHER PLANT: The CROP (grown from seeds) will be replanted.
  # The decorative PITCHER PLANT block (placed from inventory) is NOT a crop.
  pitcher_crop: true

# --------------------------
# CHAT MESSAGES (customize these)
# --------------------------

messages:
  inventory-full: "&8[&eReplenish&8] &8» &7Your inventory is full! Items dropped on the ground."
  placed-flower: "&8[&eReplenish&8] &8» &7This is a &eplaced flower&7, not a &ecrop&7. Only crops &egrown from seeds &7on farmland are replanted."
  requires-tool: "&8[&eReplenish&8] &8» &e{crop} &7requires &e{tool}&7."
  need-seed: "&8[&eReplenish&8] &8» &cNeed 1 &e{seed}&c."
