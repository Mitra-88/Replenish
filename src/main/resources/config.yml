enabled: true
requirePlayerSeed: true
directPickup: true

# ~15ms default → 1 tick
replantDelayMs: 15

# cap per-tick replant work; raise if you have headroom
maxReplantsPerTick: 4096

crops:
  wheat: true
  carrots: true
  potatoes: true
  nether_wart: true
  cocoa: true

cubeHarvest:
  enabled: false       # OFF by default
  sameTypeOnly: true   # only break same crop type as the block you harvested
  radius: 1            # 1 => 3x3x3
  hardCap: 26          # safety cap (max extra blocks per harvest)