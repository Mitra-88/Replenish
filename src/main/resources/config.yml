# =====================================================
# Replenish Plugin Configuration
# =====================================================

enabled: true
qolMode: true
requirePlayerSeed: true
restrictToHoesAndAxes: true

# Before/after delay for replant (ms). Derived 'replantDelayTicks' is written on load.
replantDelayMs: 15

# Send drops directly to player inventory (leftovers drop on ground).
directPickup: true

# Prevent “items from nowhere”:
# If false (default), breaking immature crops yields NO drops (but replant happens at same age).
# If true, immature crops can drop like vanilla (not recommended).
allowImmatureDrops: false

crops:
  wheat: true
  carrots: true
  potatoes: true
  beetroots: true
  nether_wart: true
  cocoa: true
